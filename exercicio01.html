<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Aula CSS - 1</title>

<style>

.card {
    width:500px;
    height: fit-content;
    background-color: aliceblue;
    border-radius: 25px;
    margin:20px;
}

.img-card {
    width:100px;
    height:100px;
}

.texto {
    font-family: monospace;
}

</style>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div style="width:500px; background-color: aliceblue; border-radius:25px; border: solid 8px gold; margin:20px;">

    <div style="width:100px; height:100px;">
        <img style="width:100%; margin-top:20px;"
        src="https://cdn-icons-png.flaticon.com/512/706/706830.png">
    </div>

    <h1 style="font-family: monospace;">
        Meu nome é: Adriana
    </h1>

    <p style="font-family: monospace;">
        Mensagem: A vida não é um morango!
    </p>

</div>


<div class="card" style="border: solid 8px green;">

    <div class="img-card">
        <img src="https://cdn-icons-png.flaticon.com/256/3681/3681928.png"
        style="width:100%; margin-top:20px;">
    </div>

    <h1 class="texto">
        Meu nome é: Hugo
    </h1>

    <p class="texto">
        Mensagem: Um dia é da caça, o outro é do caçador.
    </p>

</div>

</body>
</html>
